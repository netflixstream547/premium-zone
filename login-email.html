<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Cairo', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 { color: #E50914; margin-bottom: 5px; font-size: 24px; }
        p { color: #888; margin-bottom: 20px; font-size: 13px; }
        label { display: block; color: #ccc; margin-bottom: 5px; text-align: right; font-size: 13px; }
        input {
            width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 8px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif;
            margin-bottom: 12px; text-align: right;
        }
        input:focus { border-color: #E50914; outline: none; }
        .btn {
            width: 100%; padding: 14px; background: #E50914; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: 'Cairo', sans-serif; margin-top: 5px;
        }
        .btn:hover { background: #b20710; }
        .btn-outline { background: #333; }
        #msg { margin-top: 12px; font-size: 13px; }
        .link { margin-top: 18px; color: #888; font-size: 13px; }
        .link a { color: #E50914; text-decoration: none; font-weight: 600; }
        .hidden { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: 0.2s;
        }
        .tab.active { background: #E50914; border-color: #E50914; color: white; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>✉️ تسجيل الدخول</h2>
    <p>بالبريد الإلكتروني</p>
    
    <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">دخول</div>
        <div class="tab" id="tabSignup" onclick="switchTab('signup')">إنشاء حساب</div>
    </div>

    <!-- LOGIN -->
    <div id="formLogin">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="exemple@gmail.com">
        
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        
        <button class="btn" onclick="login()">دخول</button>
        <p id="loginMsg"></p>
    </div>

    <!-- SIGNUP -->
    <div id="formSignup" class="hidden">
        <label>البريد الإلكتروني</label>
        <input type="email" id="signupEmail" placeholder="exemple@gmail.com">
        
        <label>كلمة المرور</label>
        <input type="password" id="signupPassword" placeholder="كلمة المرور (6 أحرف على الأقل)">
        
        <button class="btn" onclick="signup()">إنشاء حساب</button>
        <p id="signupMsg"></p>
    </div>
    
    <p class="link"><a href="login.html">↩ الرجوع</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHXk3N1xEhDMu5HPq1-u3-Z3hJAeJkFRU",
    authDomain: "premium-zone-5f17d.firebaseapp.com",
    projectId: "premium-zone-5f17d",
    storageBucket: "premium-zone-5f17d.firebasestorage.app",
    messagingSenderId: "402341593844",
    appId: "1:402341593844:web:e740eebf719fd6b54d54a1",
    measurementId: "G-3D7WMPFGZM"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Domaines bloqués
const BLOCKED_DOMAINS = [
    'mohmal.com', 'mohmal.fr', 'temp-mail.org', 'tempmail.com',
    '10minutemail.com', 'guerrillamail.com', 'mailinator.com',
    'yopmail.com', 'throwaway.email', 'trashmail.com',
    'sharklasers.com', 'spam4.me', 'tempr.email',
    'discard.email', 'disposable.com', 'maildrop.cc',
    'emailinbo.live', 'emailnax.com', 'emailtemp.com',
    'tempmail.net', 'tmpmail.org', 'dispostable.com',
    'fakeinbox.com', 'mailnesia.com', 'spambox.us',
    'getnada.com', 'inboxalias.com', 'moakt.com',
    'dropmail.me', '0wnd.net', '0wnd.org'
];

function isBlockedDomain(email) {
    const domain = email.split('@')[1]?.toLowerCase();
    return BLOCKED_DOMAINS.some(d => domain?.includes(d));
}

function switchTab(tab) {
    if (tab === 'login') {
        document.getElementById('formLogin').classList.remove('hidden');
        document.getElementById('formSignup').classList.add('hidden');
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('tabSignup').classList.remove('active');
    } else {
        document.getElementById('formLogin').classList.add('hidden');
        document.getElementById('formSignup').classList.remove('hidden');
        document.getElementById('tabLogin').classList.remove('active');
        document.getElementById('tabSignup').classList.add('active');
    }
}

function saveUser(email) {
    localStorage.setItem('currentUser', email);
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    if (!users[email]) {
        users[email] = { password: '', credits: 0, history: [] };
        localStorage.setItem('users', JSON.stringify(users));
    }
}

function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const msg = document.getElementById('loginMsg');
    
    if (!email || !password) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ أكمل جميع الحقول';
        return;
    }
    
    msg.style.color = '#f0ad4e';
    msg.textContent = '⏳ جاري تسجيل الدخول...';
    
    auth.signInWithEmailAndPassword(email, password)
        .then((result) => {
            saveUser(email);
            window.location.href = 'dashboard.html';
        })
        .catch((error) => {
            msg.style.color = '#e87c03';
            if (error.code === 'auth/user-not-found') {
                msg.textContent = '❌ لا يوجد حساب بهذا البريد';
            } else if (error.code === 'auth/wrong-password') {
                msg.textContent = '❌ كلمة المرور خطأ';
            } else {
                msg.textContent = '❌ ' + error.message;
            }
        });
}

function signup() {
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const msg = document.getElementById('signupMsg');
    
    if (!email || !password) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ أكمل جميع الحقول';
        return;
    }
    
    if (password.length < 6) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ كلمة المرور قصيرة (6 أحرف على الأقل)';
        return;
    }
    
    if (isBlockedDomain(email)) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ البريد المؤقت غير مسموح به';
        return;
    }
    
    msg.style.color = '#f0ad4e';
    msg.textContent = '⏳ جاري إنشاء الحساب...';
    
    auth.createUserWithEmailAndPassword(email, password)
        .then((result) => {
            saveUser(email);
            window.location.href = 'dashboard.html';
        })
        .catch((error) => {
            msg.style.color = '#e87c03';
            if (error.code === 'auth/email-already-in-use') {
                msg.textContent = '❌ هذا البريد مسجل بالفعل';
            } else {
                msg.textContent = '❌ ' + error.message;
            }
        });
}
</script>

</body>
</html>
