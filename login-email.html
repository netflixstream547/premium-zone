<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Cairo', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 { color: #E50914; margin-bottom: 5px; font-size: 24px; }
        p { color: #888; margin-bottom: 20px; font-size: 13px; }
        label { display: block; color: #ccc; margin-bottom: 5px; text-align: right; font-size: 13px; }
        input {
            width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 8px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif;
            margin-bottom: 12px; text-align: right;
        }
        input:focus { border-color: #E50914; outline: none; }
        .btn {
            width: 100%; padding: 14px; background: #E50914; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: 'Cairo', sans-serif; margin-top: 5px;
        }
        .btn:hover { background: #b20710; }
        #msg { margin-top: 12px; font-size: 13px; }
        .link { margin-top: 18px; color: #888; font-size: 13px; }
        .link a { color: #E50914; text-decoration: none; font-weight: 600; }
        .signup-hint {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #222;
            color: #888;
            font-size: 12px;
        }
        .signup-hint a {
            color: #5865F2;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>✉️ تسجيل الدخول</h2>
    <p>بالبريد الإلكتروني وكلمة المرور</p>
    
    <label>البريد الإلكتروني</label>
    <input type="email" id="loginEmail" placeholder="exemple@gmail.com">
    
    <label>كلمة المرور</label>
    <input type="password" id="loginPassword" placeholder="كلمة المرور">
    
    <button class="btn" onclick="login()">دخول</button>
    <p id="msg"></p>
    
    <div class="signup-hint">
        ما عندك حساب ؟ <a href="signup.html">📝 أنشئ حساب جديد</a>
    </div>
    
    <p class="link"><a href="login.html">↩ الرجوع للرئيسية</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHXk3N1xEhDMu5HPq1-u3-Z3hJAeJkFRU",
    authDomain: "premium-zone-5f17d.firebaseapp.com",
    projectId: "premium-zone-5f17d",
    storageBucket: "premium-zone-5f17d.firebasestorage.app",
    messagingSenderId: "402341593844",
    appId: "1:402341593844:web:e740eebf719fd6b54d54a1",
    measurementId: "G-3D7WMPFGZM"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function saveUser(email) {
    localStorage.setItem('currentUser', email);
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    if (!users[email]) {
        users[email] = { password: '', credits: 0, history: [] };
        localStorage.setItem('users', JSON.stringify(users));
    }
}

function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const msg = document.getElementById('msg');
    
    if (!email || !password) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ أكمل جميع الحقول';
        return;
    }
    
    msg.style.color = '#f0ad4e';
    msg.textContent = '⏳ جاري تسجيل الدخول...';
    
    auth.signInWithEmailAndPassword(email, password)
        .then((result) => {
            saveUser(email);
            window.location.href = 'dashboard.html';
        })
        .catch((error) => {
            msg.style.color = '#e87c03';
            if (error.code === 'auth/user-not-found') {
                msg.textContent = '❌ لا يوجد حساب. <a href="signup.html">أنشئ حساب</a>';
            } else if (error.code === 'auth/wrong-password') {
                msg.textContent = '❌ كلمة المرور خطأ';
            } else {
                msg.textContent = '❌ ' + error.message;
            }
        });
}
</script>

</body>
</html>
