<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Premium Zone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h2>🔑 تسجيل الدخول</h2>
    <p>مرحباً بعودتك</p>
    
    <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="exemple@gmail.com">
    </div>
    
    <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="كلمة المرور">
    </div>
    
    <button class="btn btn-red" onclick="login()">دخول</button>
    
    <p id="msg" style="margin-top:15px; font-size:14px;"></p>
    
    <div class="form-footer">
        ما عندك حساب ؟ <a href="signup.html">أنشئ حساب</a>
    </div>
</div>

<script>
function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('msg');
    
    if (!email || !password) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ أكمل جميع الحقول';
        return;
    }
    
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    
    if (!users[email] || users[email].password !== password) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ بريد أو كلمة مرور خطأ';
        return;
    }
    
    localStorage.setItem('currentUser', email);
    
    msg.style.color = '#46d369';
    msg.textContent = '✅ تم التسجيل ! جاري التحويل...';
    
    setTimeout(() => {
        window.location.href = 'dashboard.html';
    }, 1500);
}
</script>

</body>
</html>
