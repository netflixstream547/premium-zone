<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Cairo', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 45px 35px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 42px;
            font-weight: 900;
            color: #E50914;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }
        .brand {
            color: #FFD700;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }
        .btn-social {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.2s;
        }
        .btn-google {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-google:hover { background: #f5f5f5; transform: translateY(-2px); }
        .btn-facebook {
            background: #1877F2;
            color: white;
            opacity: 0.6;
        }
        .btn-facebook:hover { opacity: 0.8; }
        .btn-email {
            background: transparent;
            border: 2px solid #333;
            color: #ccc;
        }
        .btn-email:hover { border-color: #E50914; color: white; }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #555;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #222;
        }
        .divider span { padding: 0 15px; }
        #msg { margin-top: 15px; font-size: 13px; min-height: 20px; }
        .footer-text { color: #555; font-size: 11px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">PREMIUM</div>
    <div class="brand">👑 PREMIUM ZONE</div>
    
    <button class="btn-social btn-google" onclick="loginGoogle()">
        <span style="font-size:20px;">G</span> المتابعة باستخدام Google
    </button>
    
    <button class="btn-social btn-facebook" onclick="facebookSoon()">
        <span style="font-size:20px;">f</span> المتابعة باستخدام Facebook (قريباً)
    </button>
    
    <div class="divider"><span>أو</span></div>
    
    <button class="btn-social btn-email" onclick="window.location.href='login-email.html'">
        ✉️ تسجيل الدخول بالبريد الإلكتروني
    </button>
    
    <p id="msg"></p>
    <p class="footer-text">Facebook Login sera disponible prochainement</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHXk3N1xEhDMu5HPq1-u3-Z3hJAeJkFRU",
    authDomain: "premium-zone-5f17d.firebaseapp.com",
    projectId: "premium-zone-5f17d",
    storageBucket: "premium-zone-5f17d.firebasestorage.app",
    messagingSenderId: "402341593844",
    appId: "1:402341593844:web:e740eebf719fd6b54d54a1",
    measurementId: "G-3D7WMPFGZM"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function saveUser(email) {
    localStorage.setItem('currentUser', email);
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    if (!users[email]) {
        users[email] = { password: '', credits: 0, history: [] };
        localStorage.setItem('users', JSON.stringify(users));
    }
}

function loginGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    const msg = document.getElementById('msg');
    msg.style.color = '#f0ad4e';
    msg.textContent = '⏳ جاري تسجيل الدخول...';
    
    auth.signInWithPopup(provider)
        .then((result) => {
            const email = result.user.email;
            saveUser(email);
            window.location.href = 'dashboard.html';
        })
        .catch((error) => {
            msg.style.color = '#e87c03';
            msg.textContent = '❌ ' + error.message;
        });
}

function facebookSoon() {
    const msg = document.getElementById('msg');
    msg.style.color = '#f0ad4e';
    msg.textContent = '🚧 Facebook Login en cours de développement. Utilise Google ou Email.';
}
</script>

</body>
</html>
