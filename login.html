<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Cairo', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 { color: #E50914; margin-bottom: 5px; font-size: 24px; }
        p { color: #888; margin-bottom: 20px; font-size: 13px; }
        label { display: block; color: #ccc; margin-bottom: 5px; text-align: right; font-size: 13px; }
        input {
            width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 8px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif;
            margin-bottom: 12px; text-align: right;
        }
        input:focus { border-color: #E50914; outline: none; }
        .btn {
            width: 100%; padding: 14px; background: #E50914; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: 'Cairo', sans-serif; margin-top: 5px;
        }
        .btn:hover { background: #b20710; }
        #msg { margin-top: 12px; font-size: 13px; }
        .link { margin-top: 18px; color: #888; font-size: 13px; }
        .link a { color: #E50914; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>🔑 تسجيل الدخول</h2>
    <p>مرحباً بعودتك</p>
    
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="exemple@gmail.com">
    
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="كلمة المرور">
    
    <button class="btn" onclick="login()">دخول</button>
    <p id="msg"></p>
    
    <p class="link">ما عندك حساب ؟ <a href="signup.html">أنشئ حساب</a></p>
</div>

<script>
function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('msg');
    
    if (!email || !password) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ أكمل جميع الحقول';
        return;
    }
    
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    
    if (!users[email] || users[email].password !== password) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ بريد أو كلمة مرور خطأ';
        return;
    }
    
    localStorage.setItem('currentUser', email);
    msg.style.color = '#46d369';
    msg.textContent = '✅ تم ! جاري التحويل...';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
}
</script>

</body>
</html>
