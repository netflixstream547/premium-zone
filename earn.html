<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كسب crédits - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg: #000;
            --card: #0c0c0c;
            --border: #1a1a1a;
            --red: #E50914;
            --green: #46d369;
            --gold: #FFD700;
            --blue: #5865F2;
            --orange: #f0ad4e;
            --text: #fff;
            --text2: #888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            font-family: 'Cairo', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .earn-page {
            width: 100%;
            max-width: 480px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .page-header .logo {
            font-size: 36px;
            font-weight: 900;
            color: var(--red);
            letter-spacing: 4px;
        }
        
        .page-header .brand {
            font-size: 12px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 2px;
        }
        
        .page-header h2 {
            font-size: 22px;
            margin-top: 8px;
        }
        
        .page-header p {
            color: var(--text2);
            font-size: 13px;
            margin-top: 3px;
        }
        
        /* Earn cards */
        .earn-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .earn-card:hover {
            border-color: var(--red);
            transform: translateY(-2px);
        }
        
        .earn-card .earn-icon {
            font-size: 38px;
            flex-shrink: 0;
            width: 55px;
            text-align: center;
        }
        
        .earn-card .earn-info {
            flex: 1;
        }
        
        .earn-card .earn-info h4 {
            font-size: 15px;
            margin-bottom: 3px;
        }
        
        .earn-card .earn-info p {
            font-size: 12px;
            color: var(--text2);
        }
        
        .earn-badge {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            background: var(--green);
            color: #000;
        }
        
        /* Buy card */
        .buy-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            color: var(--text);
            transition: 0.2s;
        }
        
        .buy-card:hover {
            border-color: var(--blue);
            transform: translateY(-2px);
        }
        
        .buy-card .buy-icon {
            font-size: 38px;
            flex-shrink: 0;
            width: 55px;
            text-align: center;
        }
        
        .buy-card .buy-info {
            flex: 1;
        }
        
        .buy-card .buy-info h4 {
            font-size: 15px;
            margin-bottom: 3px;
        }
        
        .buy-card .buy-info p {
            font-size: 12px;
            color: var(--text2);
        }
        
        .btn-buy {
            padding: 10px 20px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
            transition: 0.2s;
        }
        
        .btn-buy:hover {
            background: #4752c4;
            transform: scale(1.05);
        }
        
        /* Ref box */
        .ref-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .ref-box p {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 10px;
        }
        
        .ref-box .ref-link {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 11px;
            color: var(--text2);
            word-break: break-all;
            direction: ltr;
            margin-bottom: 10px;
        }
        
        .btn-copy {
            padding: 10px 20px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }
        
        .btn-copy:hover { background: #4752c4; }
        
        /* Success popup */
        .success-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--green);
            border-radius: 14px;
            padding: 16px 24px;
            text-align: center;
            z-index: 999;
            animation: slideDown 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .success-popup .popup-icon {
            font-size: 36px;
            margin-bottom: 5px;
        }
        
        .success-popup .popup-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--green);
        }
        
        .success-popup .popup-sub {
            font-size: 12px;
            color: var(--text2);
            margin-top: 2px;
        }
        
        /* Back */
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--text2);
            text-decoration: none;
            font-size: 12px;
        }
        
        .back-link a:hover { color: var(--red); }
        
        @media (max-width: 400px) {
            .earn-card, .buy-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="earn-page">
    
    <div class="page-header">
        <div class="logo">PREMIUM</div>
        <div class="brand">👑 PREMIUM ZONE</div>
        <h2>🎁 كسب crédits</h2>
        <p>اختر طريقة لكسب crédits</p>
    </div>
    
    <!-- Pub -->
    <div class="earn-card" onclick="watchAd()">
        <div class="earn-icon">📺</div>
        <div class="earn-info">
            <h4>مشاهدة إعلان</h4>
            <p>شاهد إعلان قصير واكسب</p>
        </div>
        <div class="earn-badge">+1 🪙</div>
    </div>
    
    <!-- Parrainage -->
    <div class="earn-card" onclick="showRef()">
        <div class="earn-icon">👥</div>
        <div class="earn-info">
            <h4>دعوة صديق</h4>
            <p>ادعو أصدقائك واكسب</p>
        </div>
        <div class="earn-badge" style="background:var(--gold);">+1 🪙</div>
    </div>
    
    <!-- Achat -->
    <div class="buy-card">
        <div class="buy-icon">💬</div>
        <div class="buy-info">
            <h4>شراء crédits</h4>
            <p>تواصل مع الإدارة على Facebook</p>
        </div>
        <a href="https://www.facebook.com/tonprofil" target="_blank" class="btn-buy">💬 شراء</a>
    </div>
    
    <!-- Ref Box -->
    <div id="refBox" class="ref-box" style="display:none;">
        <p>🔗 رابط الدعوة الخاص بك :</p>
        <div class="ref-link" id="refLink"></div>
        <button class="btn-copy" onclick="copyRef()">📋 نسخ الرابط</button>
    </div>
    
    <div class="back-link">
        <a href="dashboard.html">↩ العودة للوحة التحكم</a>
    </div>

</div>

<script>
function loadEarn() {
    const email = localStorage.getItem('currentUser');
    if (!email) { window.location.href = 'login.html'; return; }
    document.getElementById('refLink').textContent = 
        `https://netflixstream547.github.io/premium-zone/signup.html?ref=${btoa(email)}`;
}

function showPopup(title, sub) {
    const popup = document.createElement('div');
    popup.className = 'success-popup';
    popup.innerHTML = `
        <div class="popup-icon">🎉</div>
        <div class="popup-title">${title}</div>
        <div class="popup-sub">${sub}</div>
    `;
    document.body.appendChild(popup);
    setTimeout(() => { popup.remove(); }, 3000);
}

function watchAd() {
    alert('📺 شاهد هذا الإعلان القصير ثم اضغط موافق');
    const email = localStorage.getItem('currentUser');
    if (!email) return;
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    users[email].credits = (users[email].credits || 0) + 1;
    localStorage.setItem('users', JSON.stringify(users));
    showPopup('مبروك ! 🎉', 'تمت إضافة 1 crédit إلى رصيدك');
}

function showRef() {
    document.getElementById('refBox').style.display = 'block';
}

function copyRef() {
    const link = document.getElementById('refLink').textContent;
    navigator.clipboard.writeText(link);
    showPopup('مبروك ! 🎉', 'تم نسخ رابط الدعوة');
}

loadEarn();
</script>

</body>
</html>
