<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg: #000;
            --card: #0c0c0c;
            --border: #1a1a1a;
            --red: #E50914;
            --green: #46d369;
            --gold: #FFD700;
            --text: #fff;
            --text2: #888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            font-family: 'Cairo', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }
        
        .dashboard { width: 100%; max-width: 480px; padding-bottom: 30px; }
        
        .dash-header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .dash-header .logo { font-size: 40px; font-weight: 900; color: var(--red); letter-spacing: 6px; margin-bottom: 2px; }
        .dash-header .brand { font-size: 13px; color: var(--gold); font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
        .dash-header .welcome { color: var(--text2); font-size: 14px; margin-top: 8px; }
        .dash-header .welcome strong { color: var(--text); font-size: 16px; }
        
        .ref-code-box { background: var(--card); border: 1px solid var(--gold); border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 14px; }
        .ref-code-box .ref-label { color: var(--gold); font-size: 12px; margin-bottom: 5px; }
        .ref-code-box .ref-code { font-size: 22px; font-weight: 900; color: white; letter-spacing: 3px; margin-bottom: 10px; }
        .ref-code-box .btn-copy-ref { background: var(--gold); color: #000; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 13px; }
        
        .balance-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 35px 25px; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; }
        .balance-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; background: var(--red); opacity: 0.08; border-radius: 50%; }
        .balance-card::after { content: ''; position: absolute; bottom: -20px; left: -20px; width: 70px; height: 70px; background: var(--gold); opacity: 0.08; border-radius: 50%; }
        .balance-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; position: relative; }
        .balance-amount { font-size: 64px; font-weight: 900; color: var(--green); line-height: 1; position: relative; }
        .balance-amount .currency { font-size: 20px; color: var(--text2); font-weight: 400; margin-left: 5px; }
        
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .action-btn { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 15px; text-align: center; cursor: pointer; transition: 0.2s; text-decoration: none; color: var(--text); }
        .action-btn:hover { border-color: var(--red); transform: translateY(-2px); }
        .action-btn .icon { font-size: 30px; margin-bottom: 8px; }
        .action-btn .label { font-size: 13px; font-weight: 600; }
        .action-btn .sublabel { font-size: 10px; color: var(--text2); margin-top: 2px; }
        
        .btn-getcode { width: 100%; padding: 16px; background: var(--red); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; transition: 0.2s; margin-bottom: 12px; }
        .btn-getcode:hover { background: #b20710; transform: translateY(-2px); }
        
        .code-result { background: var(--card); border: 1px solid var(--green); border-radius: 16px; padding: 25px; text-align: center; margin-bottom: 15px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .code-result .title { color: var(--green); font-weight: 700; margin-bottom: 12px; font-size: 15px; }
        .code-result .code { font-size: 30px; font-weight: 900; letter-spacing: 6px; background: #000; padding: 14px; border-radius: 10px; font-family: monospace; color: var(--gold); margin-bottom: 10px; }
        .code-result .info { font-size: 11px; color: var(--text2); margin-bottom: 12px; }
        .code-result .btn-open { display: inline-block; padding: 12px 25px; background: var(--green); color: #000; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 14px; }
        
        .error-box { background: var(--card); border: 1px solid #e87c03; border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .error-box .error-icon { font-size: 45px; margin-bottom: 10px; }
        .error-box .error-title { font-size: 16px; font-weight: 700; color: #e87c03; margin-bottom: 5px; }
        .error-box .error-sub { font-size: 12px; color: var(--text2); }
        .error-box .error-sub a { color: var(--red); }
        
        .contact-card { background: var(--card); border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 15px; transition: 0.2s; }
        .contact-card:hover { border-color: #e87c03; }
        .contact-card .contact-icon { font-size: 24px; }
        .contact-card .contact-text { flex: 1; font-size: 12px; color: var(--text2); }
        .contact-card .contact-text strong { color: #e87c03; display: block; font-size: 13px; }
        .contact-card .btn-contact { padding: 8px 16px; background: #e87c03; color: #000; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; text-decoration: none; white-space: nowrap; }
        
        .bottom-nav { display: flex; justify-content: center; gap: 12px; margin-top: 15px; }
        .bottom-nav a { color: var(--text2); text-decoration: none; font-size: 12px; transition: 0.2s; }
        .bottom-nav a:hover { color: var(--red); }
        .bottom-nav .separator { color: #333; }
        
        .ad-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; text-align: center; margin-bottom: 14px; overflow: hidden; }
        .ad-box .ad-label { color: var(--text2); font-size: 10px; margin-bottom: 6px; }
        .ad-box iframe { max-width: 100% !important; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px 25px; text-align: center; max-width: 400px; width: 90%; animation: fadeIn 0.3s; }
        .modal-box .modal-icon { font-size: 55px; margin-bottom: 15px; }
        .modal-box .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .modal-box .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
        .modal-box .modal-highlight { color: #e87c03; font-weight: 700; }
        .modal-box .btn-download { display: inline-block; padding: 12px 25px; background: var(--red); color: white; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 14px; margin: 8px 5px; }
        .modal-box .btn-skip { display: inline-block; padding: 12px 25px; background: #333; color: #aaa; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'Cairo', sans-serif; margin: 8px 5px; }
        .modal-box .dont-show { display: block; margin-top: 12px; color: var(--text2); font-size: 11px; cursor: pointer; }
        .modal-box .dont-show:hover { color: var(--red); }
        
        @media (max-width: 400px) { .actions-grid { grid-template-columns: 1fr; } .balance-amount { font-size: 48px; } }
    </style>
</head>
<body>

<div class="dashboard">
    
    <div class="dash-header">
        <div class="logo">PREMIUM</div>
        <div class="brand">👑 PREMIUM ZONE 👑</div>
        <p class="welcome">مرحباً <strong id="userName">...</strong> 👋</p>
    </div>
    
    <!-- Code de parrainage -->
    <div class="ref-code-box">
        <div class="ref-label">🔗 Code de parrainage</div>
        <div class="ref-code" id="refCodeDisplay">...</div>
        <button class="btn-copy-ref" onclick="copyRefCode()">📋 نسخ code</button>
        <p style="color:var(--text2); font-size:10px; margin-top:8px;">شارك هذا code مع أصدقائك لتربح +1 🪙</p>
    </div>
    
    <div class="ad-box">
        <div class="ad-label">📢 Publicité</div>
        <script type="text/javascript">atOptions={'key':'05465015283265c1417592a008fdb083','format':'iframe','height':250,'width':300,'params':{}};</script>
        <script src="//www.highperformancedisplayformat.com/05465015283265c1417592a008fdb083/invoke.js"></script>
    </div>
    
    <div class="balance-card">
        <div class="balance-label">💎 رصيدك</div>
        <div class="balance-amount"><span class="currency">🪙</span><span id="solde">0</span></div>
        <div class="balance-label" style="margin-top:5px;">Crédit | سعر الكود : <span id="codePriceDisplay">1</span> 🪙</div>
    </div>
    
    <div class="actions-grid">
        <a href="earn.html" class="action-btn"><div class="icon">🎁</div><div class="label">كسب crédits</div><div class="sublabel">إعلانات · دعوة أصدقاء</div></a>
        <div class="action-btn" onclick="getCode()"><div class="icon">🎬</div><div class="label">كود Netflix</div><div class="sublabel">يستهلك <span id="btnCodePrice">1</span> 🪙</div></div>
    </div>
    
    <div class="contact-card">
        <div class="contact-icon">⚠️</div>
        <div class="contact-text"><strong>هل تواجه مشكلة ؟</strong>تواصل مع الإدارة للمساعدة</div>
        <a href="https://www.facebook.com/tonprofil" target="_blank" class="btn-contact">💬 تواصل</a>
    </div>
    
    <div id="codeResult"></div>
    
    <div class="bottom-nav">
        <a href="index.html">الرئيسية</a><span class="separator">|</span><a href="earn.html">كسب crédits</a><span class="separator">|</span><a href="#" onclick="logout()">خروج</a>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore-compat.js"></script>

<script>
const API_URL = 'https://netflix-server-l0ci.onrender.com';
let codePrice = 1;

const firebaseConfig = {
    apiKey: "AIzaSyAHXk3N1xEhDMu5HPq1-u3-Z3hJAeJkFRU",
    authDomain: "premium-zone-5f17d.firebaseapp.com",
    projectId: "premium-zone-5f17d",
    storageBucket: "premium-zone-5f17d.firebasestorage.app",
    messagingSenderId: "402341593844",
    appId: "1:402341593844:web:e740eebf719fd6b54d54a1"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.firestore();

async function saveCredits(email, credits) {
    await db.collection('users').doc(email).set({ credits: credits, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
}
async function loadCredits(email) {
    const doc = await db.collection('users').doc(email).get();
    return doc.exists ? (doc.data().credits || 0) : 0;
}

function copyRefCode() {
    const code = document.getElementById('refCodeDisplay').textContent;
    navigator.clipboard.writeText(code);
    alert('✅ Code de parrainage copié : ' + code);
}

async function loadDashboard() {
    const email = localStorage.getItem('currentUser');
    if (!email) { window.location.href = 'login.html'; return; }
    document.getElementById('userName').textContent = email.split('@')[0];
    let credits = await loadCredits(email);
    let config = JSON.parse(localStorage.getItem('siteConfig') || '{}');
    codePrice = config.codePrice || 1;
    document.getElementById('solde').textContent = credits;
    document.getElementById('codePriceDisplay').textContent = codePrice;
    document.getElementById('btnCodePrice').textContent = codePrice;
    
    // Afficher le code de parrainage
    const doc = await db.collection('users').doc(email).get();
    document.getElementById('refCodeDisplay').textContent = doc.data().refCode || 'N/A';
}

async function getCode() {
    const email = localStorage.getItem('currentUser');
    let credits = await loadCredits(email);
    const hasSeenWarning = localStorage.getItem('seenExtensionWarning_' + email);
    
    if (!hasSeenWarning) { showExtensionWarning(email, credits); return; }
    proceedToGetCode(email, credits);
}

function showExtensionWarning(email, credits) {
    const modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.id = 'warningModal';
    modal.innerHTML = '<div class="modal-box"><div class="modal-icon">🧩</div><div class="modal-title">⚠️ مهم جداً قبل الاستخدام</div><div class="modal-sub"><p style="margin-bottom:8px;">1️⃣ هل قمت <span class="modal-highlight">بتثبيت الإضافة</span> ؟</p><p style="margin-bottom:8px;">2️⃣ <span class="modal-highlight">افتح Netflix في نافذة جديدة</span> من متصفحك</p><p>3️⃣ ثم استخدم الكود في الإضافة</p></div><a href="https://drive.google.com/file/d/1JAqgRaHh-zNMrs-SOYu-zjc6arDPYZc6/view?usp=sharing" target="_blank" class="btn-download">📥 تحميل الإضافة</a><button class="btn-skip" onclick="closeWarningAndProceed(\'' + email + '\', ' + credits + ')">✅ فهمت، الإضافة مثبتة</button><span class="dont-show" onclick="closeWarningAndProceed(\'' + email + '\', ' + credits + '); localStorage.setItem(\'seenExtensionWarning_' + email + '\', \'true\');">⚠️ لا تظهر هذا مجدداً</span></div>';
    document.body.appendChild(modal);
}

function closeWarningAndProceed(email, credits) { const modal = document.getElementById('warningModal'); if (modal) modal.remove(); proceedToGetCode(email, credits); }

async function proceedToGetCode(email, credits) {
    if (credits < codePrice) { document.getElementById('codeResult').innerHTML = '<div class="error-box"><div class="error-icon">🪙</div><div class="error-title">Crédits insuffisants</div><div class="error-sub">تحتاج ' + codePrice + ' 🪙 لطلب كود جديد. <a href="earn.html">اكسب المزيد</a></div></div>'; return; }
    document.getElementById('codeResult').innerHTML = '<p style="text-align:center; color:#f0ad4e; margin-top:15px;">⏳ جاري إنشاء الكود...</p>';
    try {
        const resp = await fetch(`${API_URL}/api/generate-code?secret=monpassword123&user_id=${email}`);
        const data = await resp.json();
        if (!data.success) { let errorMsg = data.error || 'Erreur inconnue', errorTitle = 'Erreur', errorIcon = '❌'; if (errorMsg.includes('pleins') || errorMsg.includes('plein')) { errorTitle = 'Tous les comptes sont occupés'; errorIcon = '📦'; errorMsg = 'جميع الحسابات ممتلئة حالياً. تواصل مع الإدارة.'; } document.getElementById('codeResult').innerHTML = '<div class="error-box"><div class="error-icon">' + errorIcon + '</div><div class="error-title">' + errorTitle + '</div><div class="error-sub">' + errorMsg + '</div></div>'; return; }
        credits -= codePrice; await saveCredits(email, credits);
        document.getElementById('codeResult').innerHTML = '<div class="code-result"><div class="title">✅ تم إنشاء الكود !</div><div class="code">' + data.code + '</div><div class="info">⏰ صالح لمدة 10 دقائق | ⚠️ يستخدم مرة واحدة | 🌐 افتح Netflix أولاً</div><a href="https://www.netflix.com/?code=' + data.code + '" target="_blank" class="btn-open">🎬 فتح Netflix</a></div>';
        loadDashboard();
    } catch(e) { document.getElementById('codeResult').innerHTML = '<div class="error-box"><div class="error-icon">🔌</div><div class="error-title">Problème de connexion</div><div class="error-sub">تعذر الاتصال بالخادم.</div></div>'; }
}

function logout() { localStorage.removeItem('currentUser'); window.location.href = 'login.html'; }

loadDashboard();
</script>

</body>
</html>
