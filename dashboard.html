<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg: #000;
            --card: #0c0c0c;
            --border: #1a1a1a;
            --red: #E50914;
            --green: #46d369;
            --gold: #FFD700;
            --text: #fff;
            --text2: #888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            font-family: 'Cairo', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .dashboard {
            width: 100%;
            max-width: 480px;
        }
        
        .dash-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .dash-header .logo {
            font-size: 40px;
            font-weight: 900;
            color: var(--red);
            letter-spacing: 6px;
            margin-bottom: 2px;
        }
        
        .dash-header .brand {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .dash-header .welcome {
            color: var(--text2);
            font-size: 14px;
            margin-top: 8px;
        }
        
        .dash-header .welcome strong {
            color: var(--text);
            font-size: 16px;
        }
        
        .balance-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .balance-card::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: var(--red);
            opacity: 0.08;
            border-radius: 50%;
        }
        
        .balance-card::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: -20px;
            width: 70px;
            height: 70px;
            background: var(--gold);
            opacity: 0.08;
            border-radius: 50%;
        }
        
        .balance-label {
            font-size: 12px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            position: relative;
        }
        
        .balance-amount {
            font-size: 64px;
            font-weight: 900;
            color: var(--green);
            line-height: 1;
            position: relative;
        }
        
        .balance-amount .currency {
            font-size: 20px;
            color: var(--text2);
            font-weight: 400;
            margin-left: 5px;
        }
        
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .action-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: var(--text);
        }
        
        .action-btn:hover {
            border-color: var(--red);
            transform: translateY(-2px);
        }
        
        .action-btn .icon {
            font-size: 30px;
            margin-bottom: 8px;
        }
        
        .action-btn .label {
            font-size: 13px;
            font-weight: 600;
        }
        
        .action-btn .sublabel {
            font-size: 10px;
            color: var(--text2);
            margin-top: 2px;
        }
        
        .btn-getcode {
            width: 100%;
            padding: 16px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        
        .btn-getcode:hover {
            background: #b20710;
            transform: translateY(-2px);
        }
        
        .code-result {
            background: var(--card);
            border: 1px solid var(--green);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .code-result .title {
            color: var(--green);
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 15px;
        }
        
        .code-result .code {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 6px;
            background: #000;
            padding: 14px;
            border-radius: 10px;
            font-family: monospace;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .code-result .info {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 12px;
        }
        
        .code-result .btn-open {
            display: inline-block;
            padding: 12px 25px;
            background: var(--green);
            color: #000;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
        
        .contact-card {
            background: var(--card);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        
        .contact-card:hover {
            border-color: #e87c03;
        }
        
        .contact-card .contact-icon {
            font-size: 24px;
        }
        
        .contact-card .contact-text {
            flex: 1;
            font-size: 12px;
            color: var(--text2);
        }
        
        .contact-card .contact-text strong {
            color: #e87c03;
            display: block;
            font-size: 13px;
        }
        
        .contact-card .btn-contact {
            padding: 8px 16px;
            background: #e87c03;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            text-decoration: none;
            white-space: nowrap;
        }
        
        .bottom-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        
        .bottom-nav a {
            color: var(--text2);
            text-decoration: none;
            font-size: 12px;
            transition: 0.2s;
        }
        
        .bottom-nav a:hover { color: var(--red); }
        .bottom-nav .separator { color: #333; }
        
        .ad-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            margin-bottom: 14px;
        }
        .ad-box .ad-label { color: var(--text2); font-size: 11px; margin-bottom: 8px; }
        
        @media (max-width: 400px) {
            .actions-grid { grid-template-columns: 1fr; }
            .balance-amount { font-size: 48px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    
    <div class="dash-header">
        <div class="logo">PREMIUM</div>
        <div class="brand">👑 PREMIUM ZONE 👑</div>
        <p class="welcome">مرحباً <strong id="userName">...</strong> 👋</p>
    </div>
    
    <div class="ad-box">
        <div class="ad-label">📢 Publicité</div>
        <script type="text/javascript">
            atOptions = {
                'key' : 'ec0302a9ddfe2a39ca5eb46e7e9aa198',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/ec0302a9ddfe2a39ca5eb46e7e9aa198/invoke.js"></script>
    </div>
    
    <div class="balance-card">
        <div class="balance-label">💎 رصيدك</div>
        <div class="balance-amount"><span class="currency">🪙</span><span id="solde">0</span></div>
        <div class="balance-label" style="margin-top:5px;">Crédit | سعر الكود : <span id="codePriceDisplay">1</span> 🪙</div>
    </div>
    
    <div class="actions-grid">
        <a href="earn.html" class="action-btn">
            <div class="icon">🎁</div>
            <div class="label">كسب crédits</div>
            <div class="sublabel">إعلانات · دعوة أصدقاء</div>
        </a>
        <div class="action-btn" onclick="getCode()">
            <div class="icon">🎬</div>
            <div class="label">كود Netflix</div>
            <div class="sublabel">يستهلك <span id="btnCodePrice">1</span> 🪙</div>
        </div>
    </div>
    
    <div class="contact-card">
        <div class="contact-icon">⚠️</div>
        <div class="contact-text">
            <strong>هل تواجه مشكلة ؟</strong>
            تواصل مع الإدارة للمساعدة
        </div>
        <a href="https://www.facebook.com/tonprofil" target="_blank" class="btn-contact">💬 تواصل</a>
    </div>
    
    <div id="codeResult"></div>
    
    <div class="bottom-nav">
        <a href="index.html">الرئيسية</a>
        <span class="separator">|</span>
        <a href="earn.html">كسب crédits</a>
        <span class="separator">|</span>
        <a href="#" onclick="logout()">خروج</a>
    </div>

</div>

<script>
const API_URL = 'https://netflix-server-l0ci.onrender.com';
let codePrice = 1;

function loadDashboard() {
    const email = localStorage.getItem('currentUser');
    if (!email) { window.location.href = 'login.html'; return; }
    
    document.getElementById('userName').textContent = email.split('@')[0];
    
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    const user = users[email];
    if (!user) { window.location.href = 'login.html'; return; }
    
    let config = JSON.parse(localStorage.getItem('siteConfig') || '{}');
    codePrice = config.codePrice || 1;
    
    document.getElementById('solde').textContent = user.credits || 0;
    document.getElementById('codePriceDisplay').textContent = codePrice;
    document.getElementById('btnCodePrice').textContent = codePrice;
}

async function getCode() {
    const email = localStorage.getItem('currentUser');
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    const user = users[email];
    
    if (!user || user.credits < codePrice) {
        document.getElementById('codeResult').innerHTML = 
            '<p style="text-align:center; color:#e87c03; margin-top:15px;">❌ لا يوجد لديك crédits كافية. تحتاج ' + codePrice + ' 🪙. <a href="earn.html" style="color:#E50914;">اكسب المزيد</a></p>';
        return;
    }
    
    document.getElementById('codeResult').innerHTML = 
        '<p style="text-align:center; color:#f0ad4e; margin-top:15px;">⏳ جاري إنشاء الكود...</p>';
    
    try {
        const resp = await fetch(`${API_URL}/api/generate-code?secret=monpassword123&user_id=${email}`);
        const data = await resp.json();
        
        if (data.success) {
            user.credits -= codePrice;
            user.history = user.history || [];
            user.history.push({ code: data.code, date: new Date().toISOString() });
            users[email] = user;
            localStorage.setItem('users', JSON.stringify(users));
            
            document.getElementById('codeResult').innerHTML = `
                <div class="code-result">
                    <div class="title">✅ تم إنشاء الكود !</div>
                    <div class="code">${data.code}</div>
                    <div class="info">⏰ صالح لمدة 10 دقائق | ⚠️ يستخدم مرة واحدة</div>
                    <a href="https://www.netflix.com/?code=${data.code}" target="_blank" class="btn-open">🎬 فتح Netflix</a>
                </div>
            `;
            loadDashboard();
        } else {
            document.getElementById('codeResult').innerHTML = 
                '<p style="text-align:center; color:#e87c03; margin-top:15px;">❌ ' + data.error + '</p>';
        }
    } catch(e) {
        document.getElementById('codeResult').innerHTML = 
            '<p style="text-align:center; color:#e87c03; margin-top:15px;">❌ خطأ في الاتصال</p>';
    }
}

function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
}

loadDashboard();
</script>

</body>
</html>
