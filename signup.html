<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Cairo', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 35px 30px; width: 100%; max-width: 420px; text-align: center; }
        h2 { color: #E50914; margin-bottom: 5px; font-size: 24px; }
        p { color: #888; margin-bottom: 20px; font-size: 13px; }
        label { display: block; color: #ccc; margin-bottom: 5px; text-align: right; font-size: 13px; }
        input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif; margin-bottom: 12px; text-align: right; }
        input:focus { border-color: #E50914; outline: none; }
        .btn { width: 100%; padding: 14px; background: #E50914; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; margin-top: 5px; }
        .btn:hover { background: #b20710; }
        #msg { margin-top: 12px; font-size: 13px; }
        .link { margin-top: 18px; color: #888; font-size: 13px; }
        .link a { color: #E50914; text-decoration: none; font-weight: 600; }
        .info-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 15px; text-align: right; font-size: 12px; color: #aaa; }
        .info-box strong { color: #E50914; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>📝 إنشاء حساب</h2>
    <p>سجل مجاناً وابدأ</p>
    
    <div class="info-box">
        <strong>📧 مسموح فقط :</strong> Gmail (@gmail.com) • Outlook (@outlook.com, @hotmail.com)
    </div>

    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="exemple@gmail.com">
    
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="كلمة المرور (6 أحرف على الأقل)">
    
    <label>Code de parrainage (اختياري)</label>
    <input type="text" id="refCode" placeholder="أدخل code parrainage">
    
    <button class="btn" onclick="signup()">إنشاء الحساب</button>
    <p id="msg"></p>
    
    <p class="link">عندك حساب ؟ <a href="login.html">سجل الدخول</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHXk3N1xEhDMu5HPq1-u3-Z3hJAeJkFRU",
    authDomain: "premium-zone-5f17d.firebaseapp.com",
    projectId: "premium-zone-5f17d",
    storageBucket: "premium-zone-5f17d.firebasestorage.app",
    messagingSenderId: "402341593844",
    appId: "1:402341593844:web:e740eebf719fd6b54d54a1",
    measurementId: "G-3D7WMPFGZM"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();
const db = firebase.firestore();

const ALLOWED_DOMAINS = ['gmail.com', 'outlook.com', 'hotmail.com'];
const BLOCKED_DOMAINS = ['mohmal.com', 'mohmal.fr', 'temp-mail.org', 'tempmail.com', '10minutemail.com', 'guerrillamail.com', 'mailinator.com', 'yopmail.com', 'throwaway.email', 'trashmail.com', 'sharklasers.com', 'spam4.me', 'tempr.email', 'discard.email', 'disposable.com', 'maildrop.cc', 'emailinbo.live', 'emailnax.com', 'emailtemp.com'];

function isBlocked(email) { const domain = email.split('@')[1]?.toLowerCase(); return BLOCKED_DOMAINS.some(d => domain?.includes(d)); }
function isAllowed(email) { const domain = email.split('@')[1]?.toLowerCase(); return ALLOWED_DOMAINS.includes(domain); }

async function saveCredits(email, credits) {
    await db.collection('users').doc(email).set({ credits: credits, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
}

async function getWelcomeCredits() {
    const configDoc = await db.collection('settings').doc('siteConfig').get();
    if (configDoc.exists) { return configDoc.data().welcomeCredits || 0; }
    return 0;
}

function signup() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const refCode = document.getElementById('refCode').value.trim();
    const msg = document.getElementById('msg');
    
    if (!email || !password) { msg.style.color = '#e87c03'; msg.textContent = '❌ أكمل جميع الحقول'; return; }
    if (password.length < 6) { msg.style.color = '#e87c03'; msg.textContent = '❌ كلمة المرور قصيرة (6 أحرف)'; return; }
    if (isBlocked(email)) { msg.style.color = '#e87c03'; msg.textContent = '❌ البريد المؤقت غير مسموح'; return; }
    if (!isAllowed(email)) { msg.style.color = '#e87c03'; msg.textContent = '❌ فقط Gmail ou Outlook مسموح'; return; }
    
    msg.style.color = '#f0ad4e'; msg.textContent = '⏳ جاري إنشاء الحساب...';
    
    auth.createUserWithEmailAndPassword(email, password)
        .then(async () => {
            const myRefCode = email.split('@')[0].toUpperCase() + Math.random().toString(36).substring(2, 6).toUpperCase();
            let welcomeCredits = await getWelcomeCredits();
            
            // Sauvegarder dans Firestore avec .then()
            db.collection('users').doc(email).set({
                password: '', credits: welcomeCredits, history: [], refCode: myRefCode, createdAt: Date.now()
            }).then(async () => {
                console.log('✅ Ajouté à Firestore:', email);
                
                // Parrainage
                if (refCode) {
                    const snapshot = await db.collection('users').where('refCode', '==', refCode).get();
                    if (!snapshot.empty) {
                        const parrainDoc = snapshot.docs[0];
                        await saveCredits(parrainDoc.id, (parrainDoc.data().credits || 0) + 1);
                    }
                }
                
                localStorage.setItem('currentUser', email);
                window.location.href = 'dashboard.html';
                
            }).catch((e) => {
                console.error('❌ Erreur Firestore:', e);
                localStorage.setItem('currentUser', email);
                window.location.href = 'dashboard.html';
            });
        })
        .catch((error) => {
            msg.style.color = '#e87c03';
            msg.textContent = '❌ ' + (error.code === 'auth/email-already-in-use' ? 'هذا البريد مسجل بالفعل' : error.message);
        });
}
</script>

</body>
</html>
