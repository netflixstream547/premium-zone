<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHXk3N1xEhDMu5HPq1-u3-Z3hJAeJkFRU",
    authDomain: "premium-zone-5f17d.firebaseapp.com",
    projectId: "premium-zone-5f17d",
    storageBucket: "premium-zone-5f17d.firebasestorage.app",
    messagingSenderId: "402341593844",
    appId: "1:402341593844:web:e740eebf719fd6b54d54a1"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.firestore();

async function saveCredits(email, credits) {
    await db.collection('users').doc(email).set({ credits: credits, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
}
async function loadCredits(email) {
    const doc = await db.collection('users').doc(email).get();
    return doc.exists ? (doc.data().credits || 0) : 0;
}
async function userExists(email) {
    const doc = await db.collection('users').doc(email).get();
    return doc.exists;
}

const ADMIN_EMAIL = "beyassine789@gmail.com";
const ADMIN_PASS = "yassine1919";
const RECOVERY_CODE = "premium2026";

function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPass').value.trim();
    const msg = document.getElementById('loginMsg');
    if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
        localStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('panelBox').style.display = 'block';
        loadAll();
    } else { msg.className = 'msg msg-error'; msg.textContent = '❌ Email ou mot de passe incorrect'; }
}

function forgotPassword() {
    const email = document.getElementById('adminEmail').value.trim();
    const msg = document.getElementById('loginMsg');
    if (!email) { msg.textContent = '❌ Entre ton email'; return; }
    if (email !== ADMIN_EMAIL) { msg.textContent = '❌ Email non reconnu'; return; }
    const code = prompt('🔑 Code de récupération :');
    if (code === RECOVERY_CODE) { alert('✅ Mot de passe : ' + ADMIN_PASS); msg.className = 'msg msg-success'; msg.textContent = '✅ Mot de passe affiché'; }
    else { msg.className = 'msg msg-error'; msg.textContent = '❌ Code incorrect'; }
}

function logout() { localStorage.removeItem('adminLoggedIn'); location.reload(); }

async function saveConfig() {
    const config = {
        codePrice: parseInt(document.getElementById('configCodePrice').value) || 1,
        dailyCredits: parseInt(document.getElementById('configDaily').value) || 1,
        welcomeCredits: parseInt(document.getElementById('configWelcome').value) || 0
    };
    localStorage.setItem('siteConfig', JSON.stringify(config));
    await db.collection('settings').doc('siteConfig').set(config);
    document.getElementById('configMsg').className = 'msg msg-success';
    document.getElementById('configMsg').textContent = '✅ Configuration sauvegardée dans Firestore !';
}

async function loadConfig() {
    const doc = await db.collection('settings').doc('siteConfig').get();
    if (doc.exists) {
        const config = doc.data();
        document.getElementById('configCodePrice').value = config.codePrice || 1;
        document.getElementById('configDaily').value = config.dailyCredits || 1;
        document.getElementById('configWelcome').value = config.welcomeCredits || 0;
    }
}

async function addCredits() {
    const email = document.getElementById('userEmail').value.trim();
    const credits = parseInt(document.getElementById('credits').value);
    const msg = document.getElementById('addMsg');
    if (!email || !credits) { msg.className = 'msg msg-error'; msg.textContent = '❌ Remplis tous les champs'; return; }
    const exists = await userExists(email);
    if (!exists) { msg.className = 'msg msg-error'; msg.textContent = '❌ Utilisateur introuvable dans Firestore'; return; }
    let current = await loadCredits(email);
    await saveCredits(email, current + credits);
    msg.className = 'msg msg-success'; msg.textContent = `✅ ${credits} crédits ajoutés à ${email}`;
    document.getElementById('userEmail').value = '';
}

async function checkEmail() {
    const email = document.getElementById('checkEmail').value.trim();
    const msg = document.getElementById('checkMsg');
    if (!email) { msg.className = 'msg msg-error'; msg.textContent = '❌ Entre un email'; return; }
    const exists = await userExists(email);
    if (exists) {
        let credits = await loadCredits(email);
        msg.className = 'msg msg-success';
        msg.textContent = `✅ مسجل | 🪙 ${credits} crédits`;
    } else { msg.className = 'msg msg-error'; msg.textContent = '❌ غير مسجل dans Firestore'; }
}

function banUser() {
    const email = document.getElementById('checkEmail').value.trim();
    const msg = document.getElementById('checkMsg');
    if (!email) { msg.className = 'msg msg-error'; msg.textContent = '❌ Entre un email'; return; }
    db.collection('users').doc(email).delete().then(() => {
        msg.className = 'msg msg-success'; msg.textContent = `🚫 ${email} supprimé de Firestore`;
        document.getElementById('checkEmail').value = '';
    });
}

async function deleteUser(email) {
    if (!confirm(`Supprimer ${email} ?`)) return;
    await db.collection('users').doc(email).delete();
}

function loadAll() {
    db.collection('users').onSnapshot((snapshot) => {
        let users = {};
        snapshot.forEach(doc => { users[doc.id] = doc.data(); });
        let emails = Object.keys(users);
        document.getElementById('statUsers').textContent = emails.length;
        let totalCodes = 0;
        emails.forEach(e => { totalCodes += (users[e].history || []).length; });
        document.getElementById('statCodes').textContent = totalCodes;
        let html = '';
        if (emails.length === 0) {
            html = '<p style="color:var(--text2); text-align:center;">لا يوجد مستخدمين dans Firestore</p>';
        } else {
            emails.forEach(email => {
                const u = users[email];
                html += `<div class="user-row"><div class="user-info"><div class="user-email">${email}</div><div class="user-date">🪙 ${u.credits || 0} crédits | 📅 ${(u.history || []).length} codes</div></div><button class="btn btn-red btn-sm" onclick="deleteUser('${email}')">🗑️</button></div>`;
            });
        }
        document.getElementById('userList').innerHTML = html;
    }, (error) => {
        document.getElementById('userList').innerHTML = '<p style="color:#e87c03; text-align:center;">❌ Erreur Firestore: ' + error.message + '</p>';
    });
    
    fetch('https://netflix-server-l0ci.onrender.com/')
        .then(r => r.json())
        .then(data => { document.getElementById('statCookies').textContent = data.comptes || 0; })
        .catch(() => { document.getElementById('statCookies').textContent = '?'; });
    
    loadConfig();
}

if (localStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('panelBox').style.display = 'block';
    loadAll();
}
</script>
