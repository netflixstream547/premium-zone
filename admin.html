<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Premium Zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Cairo', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box, .panel-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 { color: #E50914; margin-bottom: 5px; font-size: 24px; }
        p { color: #888; margin-bottom: 20px; font-size: 13px; }
        label { display: block; color: #ccc; margin-bottom: 5px; text-align: right; font-size: 13px; }
        input {
            width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 8px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif;
            margin-bottom: 12px; text-align: right;
        }
        input:focus { border-color: #E50914; outline: none; }
        .btn {
            width: 100%; padding: 14px; background: #E50914; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: 'Cairo', sans-serif; margin-top: 5px;
        }
        .btn:hover { background: #b20710; }
        .btn-green { background: #46d369; }
        .btn-green:hover { background: #3ab558; }
        #msg { margin-top: 12px; font-size: 13px; }
        .info-box {
            background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
            padding: 15px; margin: 15px 0; text-align: right; font-size: 13px;
        }
        .info-box span { color: #46d369; font-weight: 700; }
    </style>
</head>
<body>

<!-- LOGIN ADMIN -->
<div class="login-box" id="loginBox">
    <h2>🔐 Admin Login</h2>
    <p>Panel réservé à l'administration</p>
    <label>Email</label>
    <input type="email" id="adminEmail" placeholder="admin@email.com">
    <label>Mot de passe</label>
    <input type="password" id="adminPass" placeholder="Mot de passe">
    <button class="btn" onclick="adminLogin()">Connexion</button>
    <p id="loginMsg" style="margin-top:10px; font-size:13px;"></p>
</div>

<!-- PANEL ADMIN -->
<div class="panel-box" id="panelBox" style="display:none;">
    <h2>🔧 Panel Admin</h2>
    <p>Ajouter des crédits à un utilisateur</p>
    
    <label>Email de l'utilisateur</label>
    <input type="email" id="userEmail" placeholder="utilisateur@gmail.com">
    
    <label>Nombre de crédits</label>
    <input type="number" id="credits" value="30" min="1">
    
    <button class="btn" onclick="addCredits()">✅ Ajouter crédits</button>
    
    <p id="panelMsg" style="margin-top:12px; font-size:13px;"></p>
    
    <div class="info-box">
        <p>👤 <strong>Utilisateurs enregistrés :</strong> <span id="userCount">0</span></p>
    </div>
    
    <button class="btn btn-green" onclick="logout()" style="margin-top:8px;">🚪 Déconnexion</button>
</div>

<script>
// Compte admin
const ADMIN_EMAIL = "beyassine789@gmail.com";
const ADMIN_PASS = "yassine1919";

function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPass').value.trim();
    const msg = document.getElementById('loginMsg');
    
    if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
        localStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('panelBox').style.display = 'block';
        loadStats();
    } else {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ Email ou mot de passe incorrect';
    }
}

function addCredits() {
    const email = document.getElementById('userEmail').value.trim();
    const credits = parseInt(document.getElementById('credits').value);
    const msg = document.getElementById('panelMsg');
    
    if (!email || !credits) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ Remplis tous les champs';
        return;
    }
    
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    
    if (!users[email]) {
        msg.style.color = '#e87c03';
        msg.textContent = '❌ Utilisateur introuvable';
        return;
    }
    
    users[email].credits = (users[email].credits || 0) + credits;
    localStorage.setItem('users', JSON.stringify(users));
    
    msg.style.color = '#46d369';
    msg.textContent = `✅ ${credits} crédits ajoutés à ${email}`;
    
    loadStats();
}

function loadStats() {
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    document.getElementById('userCount').textContent = Object.keys(users).length;
}

function logout() {
    localStorage.removeItem('adminLoggedIn');
    location.reload();
}

// Vérifier si déjà connecté
if (localStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('panelBox').style.display = 'block';
    loadStats();
}
</script>

</body>
</html>
